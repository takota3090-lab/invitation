<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="theme-color" content="#fff5f0">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <title>دعوة عشاء | منيرة الحربي</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;500;600;700;800&family=Amiri:wght@400;600;700;800&family=Playfair+Display:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            font-family: 'Cairo', 'Amiri', system-ui, sans-serif;
            background: #ffffff;
            height: 100vh;
            width: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 0;
            margin: 0;
            position: fixed;
            top: 0;
            left: 0;
            overflow: hidden;
        }

        /* Full Screen Container - No Scroll */
        .full-screen {
            width: 100%;
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            position: relative;
        }

        /* Main Container */
        .invitation-card {
            position: relative;
            z-index: 10;
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            background: #fff5f0;
            overflow: hidden;
        }

        /* Content - Perfectly Centered, No Scroll */
        .content {
            width: 100%;
            max-width: 480px;
            padding: 16px 24px;
            margin: 0 auto;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        /* Designer Credit - Top */
        .designer-credit {
            text-align: center;
            margin-bottom: 12px;
        }

        .designer-credit p {
            font-size: 0.65rem;
            color: #c4c4c4;
            letter-spacing: 1px;
        }

        /* Title - Premium Font */
        .title {
            text-align: center;
            margin-bottom: 8px;
        }

        .title h1 {
            font-size: 2rem;
            font-weight: 800;
            font-family: 'Playfair Display', 'Amiri', serif;
            color: #d4a5a5;
            letter-spacing: 1px;
        }

        /* Host Name */
        .host-name {
            text-align: center;
            margin: 6px 0 10px;
        }

        .host-name p {
            font-size: 0.95rem;
            font-weight: 600;
            color: #c4a5a5;
            letter-spacing: 1px;
            position: relative;
            display: inline-block;
            padding: 0 18px;
        }

        .host-name p::before,
        .host-name p::after {
            content: '✦';
            position: absolute;
            top: 50%;
            transform: translateY(-50%);
            color: #e6c3c3;
            font-size: 0.7rem;
        }

        .host-name p::before {
            right: -10px;
        }

        .host-name p::after {
            left: -10px;
        }

        .subtitle {
            text-align: center;
            margin-bottom: 16px;
        }

        .subtitle p {
            color: #2c2c2c;
            font-size: 0.75rem;
        }

        /* Invitation Message - Smaller */
        .message {
            background: #fdf8f5;
            border-radius: 28px;
            padding: 12px 16px;
            margin: 8px 0;
            text-align: center;
            border: 1px solid #f5e0e0;
        }

        .message h2 {
            font-size: 0.9rem;
            font-weight: 700;
            color: #2c2c2c;
            margin-bottom: 6px;
        }

        .message p {
            font-size: 0.75rem;
            line-height: 1.5;
            color: #2c2c2c;
        }

        /* Countdown Timer - Smaller */
        .countdown-section {
            background: #fdf8f5;
            border-radius: 28px;
            padding: 10px 12px;
            margin: 8px 0;
            text-align: center;
            border: 1px solid #f5e0e0;
        }

        .countdown-title {
            font-size: 0.65rem;
            color: #2c2c2c;
            margin-bottom: 8px;
            text-transform: uppercase;
            letter-spacing: 1.5px;
        }

        .countdown {
            display: flex;
            justify-content: center;
            gap: 12px;
        }

        .countdown-item {
            text-align: center;
            min-width: 55px;
        }

        .countdown-number {
            font-size: 1.3rem;
            font-weight: 800;
            color: #2c2c2c;
            background: #fff5f0;
            padding: 5px 8px;
            border-radius: 16px;
            font-family: monospace;
            letter-spacing: 1px;
            border: 1px solid #f5e0e0;
        }

        .countdown-label {
            font-size: 0.55rem;
            color: #2c2c2c;
            margin-top: 3px;
        }

        /* Date & Time Section - Unified, Smaller */
        .datetime-section {
            background: #fdf8f5;
            border-radius: 28px;
            padding: 10px 12px;
            margin: 8px 0;
            text-align: center;
            border: 1px solid #f5e0e0;
        }

        .date-header {
            font-size: 0.65rem;
            color: #2c2c2c;
            margin-bottom: 8px;
            text-transform: uppercase;
            letter-spacing: 1.5px;
        }

        .date-main {
            font-size: 0.9rem;
            font-weight: 700;
            color: #2c2c2c;
            margin-bottom: 4px;
            line-height: 1.4;
        }

        .date-secondary {
            font-size: 0.75rem;
            color: #6a6a6a;
            margin-bottom: 8px;
            font-weight: 500;
        }

        .time-display {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
            background: #fff5f0;
            padding: 5px 12px;
            border-radius: 40px;
            width: fit-content;
            margin: 0 auto;
            border: 1px solid #f5e0e0;
        }

        .time-icon {
            font-size: 1rem;
        }

        .time-value {
            font-size: 0.8rem;
            font-weight: 700;
            color: #2c2c2c;
        }

        /* Action Buttons - Smaller */
        .action-buttons {
            display: flex;
            gap: 10px;
            margin: 8px 0;
        }

        .map-btn, .share-btn {
            flex: 1;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
            background: #f5e8e8;
            border: 1px solid #e6c3c3;
            padding: 10px 12px;
            border-radius: 50px;
            color: #2c2c2c;
            font-weight: 700;
            font-size: 0.75rem;
            cursor: pointer;
            transition: all 0.2s;
            font-family: inherit;
        }

        .map-btn:active, .share-btn:active {
            transform: scale(0.97);
            background: #f0e0e0;
        }

        /* Decorative Divider - Smaller */
        .decorative-divider {
            text-align: center;
            margin: 12px 0 8px;
            position: relative;
        }

        .decorative-divider span {
            font-size: 0.7rem;
            color: #e6c3c3;
            background: #fff5f0;
            padding: 0 10px;
            display: inline-block;
        }

        .decorative-divider::before {
            content: '';
            position: absolute;
            top: 50%;
            left: 0;
            right: 0;
            height: 1px;
            background: #f5e0e0;
            z-index: -1;
        }

        /* Footer - No designer credit here anymore */
        .footer {
            text-align: center;
            margin-top: 8px;
            padding-top: 6px;
            border-top: 1px solid #f5e0e0;
        }

        .footer p {
            font-size: 0.55rem;
            color: #c4c4c4;
        }

        /* Toast */
        .toast {
            position: fixed;
            bottom: 70px;
            left: 50%;
            transform: translateX(-50%) translateY(100px);
            background: #f5e8e8;
            color: #c4a5a5;
            padding: 8px 18px;
            border-radius: 50px;
            font-size: 0.75rem;
            font-weight: 600;
            opacity: 0;
            transition: all 0.3s ease;
            z-index: 200;
            pointer-events: none;
            white-space: nowrap;
            border: 1px solid #e6c3c3;
        }

        .toast.show {
            transform: translateX(-50%) translateY(0);
            opacity: 1;
        }

        /* Responsive - Mobile Only */
        @media (max-width: 480px) {
            .content {
                padding: 12px 20px;
            }
            .title h1 {
                font-size: 1.7rem;
            }
            .countdown-number {
                font-size: 1.1rem;
                padding: 4px 6px;
                min-width: 42px;
            }
            .countdown-item {
                min-width: 48px;
            }
            .date-main {
                font-size: 0.85rem;
            }
            .date-secondary {
                font-size: 0.7rem;
            }
            .map-btn, .share-btn {
                padding: 8px 10px;
                font-size: 0.7rem;
            }
        }

        @media (max-width: 400px) {
            .countdown {
                gap: 8px;
            }
            .countdown-item {
                min-width: 42px;
            }
            .countdown-number {
                font-size: 1rem;
                padding: 3px 5px;
            }
        }

        @media (max-height: 700px) {
            .content {
                padding: 8px 20px;
            }
            .message {
                padding: 8px 12px;
                margin: 6px 0;
            }
            .countdown-section {
                padding: 6px 10px;
                margin: 6px 0;
            }
            .datetime-section {
                padding: 6px 10px;
                margin: 6px 0;
            }
            .title h1 {
                font-size: 1.5rem;
            }
            .host-name {
                margin: 4px 0 6px;
            }
            .subtitle {
                margin-bottom: 10px;
            }
            .designer-credit {
                margin-bottom: 6px;
            }
        }
    </style>
</head>
<body>
    <div class="full-screen">
        <div class="invitation-card">
            <div class="content">
                <!-- Designer Credit - Top -->
                <div class="designer-credit">
                    <p>تصميم: سعود</p>
                </div>

                <!-- Title - Premium Font -->
                <div class="title">
                    <h1>دعوة عشاء</h1>
                </div>

                <!-- Host Name -->
                <div class="host-name">
                    <p>منيرة الحربي</p>
                </div>

                <div class="subtitle">
                    <p>بكل حب وسعادة أدعوكم لمشاركتنا أمسية مميزة</p>
                </div>

                <!-- Invitation Message -->
                <div class="message">
                    <h2>يسرني دعوتكم</h2>
                    <p>لتشريفنا بحضور عشاء خاص في منزلي<br>نتشرف بوجودكم معنا</p>
                </div>

                <!-- Countdown Timer -->
                <div class="countdown-section">
                    <div class="countdown-title">⏳ المتبقي على الموعد</div>
                    <div class="countdown" id="countdown">
                        <div class="countdown-item">
                            <div class="countdown-number" id="days">00</div>
                            <div class="countdown-label">يوم</div>
                        </div>
                        <div class="countdown-item">
                            <div class="countdown-number" id="hours">00</div>
                            <div class="countdown-label">ساعة</div>
                        </div>
                        <div class="countdown-item">
                            <div class="countdown-number" id="minutes">00</div>
                            <div class="countdown-label">دقيقة</div>
                        </div>
                        <div class="countdown-item">
                            <div class="countdown-number" id="seconds">00</div>
                            <div class="countdown-label">ثانية</div>
                        </div>
                    </div>
                </div>

                <!-- Date & Time Section - Unified -->
                <div class="datetime-section">
                    <div class="date-header">📅 التاريخ</div>
                    <div class="date-main" id="gregorian-date">الخميس 7 مايو 2026</div>
                    <div class="date-secondary" id="hijri-date">20 شوال 1447 هـ</div>
                    <div class="time-display">
                        <span class="time-icon">⏰</span>
                        <span class="time-value">8:00 مساءً</span>
                    </div>
                </div>

                <!-- Action Buttons -->
                <div class="action-buttons">
                    <button class="map-btn" id="map-button">
                        <span>🗺️</span> فتح الخريطة
                    </button>
                    <button class="share-btn" id="share-button">
                        <span>📤</span> مشاركة الدعوة
                    </button>
                </div>

                <!-- Decorative Divider -->
                <div class="decorative-divider">
                    <span>✦ ننتظر حضوركم بكل شوق ✦</span>
                </div>

                <!-- Footer -->
                <div class="footer">
                    <p></p>
                </div>
            </div>
        </div>
    </div>

    <div id="toast" class="toast"></div>

    <script>
        // Fixed event date: May 7, 2026 at 8:00 PM
        const eventDate = new Date(2026, 4, 7, 20, 0, 0); // Month is 0-indexed, so 4 = May

        // Function to convert Gregorian date to Hijri (Islamic Calendar)
        function getHijriDate(date) {
            const hijriFormatter = new Intl.DateTimeFormat('ar-SA-u-ca-islamic', {
                year: 'numeric',
                month: 'long',
                day: 'numeric'
            });
            return hijriFormatter.format(date);
        }

        // Function to get Gregorian date in Arabic
        function getGregorianDate(date) {
            const gregorianFormatter = new Intl.DateTimeFormat('ar-SA', {
                weekday: 'long',
                year: 'numeric',
                month: 'long',
                day: 'numeric'
            });
            return gregorianFormatter.format(date);
        }

        // ==================== Google Maps Link ====================
        const mapsLink = "https://www.google.com/maps/search/الدمام+حي+الشاطئ+شارع+الأمير+محمد+بن+فهد";

        // ==================== Share Invitation ====================
        function shareInvitation() {
            const gregorianDate = document.getElementById('gregorian-date').textContent;
            const hijriDate = document.getElementById('hijri-date').textContent;
            const shareText = `🍽️ دعوة عشاء من منيرة الحربي\n\nيسرني دعوتكم لحضور عشاء خاص في منزلي\n📍 الدمام، حي الشاطئ، شارع الأمير محمد بن فهد\n📅 ${gregorianDate}\n📅 ${hijriDate}\n⏰ 8:00 مساءً\n\nنتمنى تشريفكم 🌟`;
            
            if (navigator.share) {
                navigator.share({
                    title: 'دعوة عشاء',
                    text: shareText,
                    url: mapsLink
                }).catch(() => {
                    copyToClipboard(shareText);
                });
            } else {
                copyToClipboard(shareText);
            }
        }

        function copyToClipboard(text) {
            navigator.clipboard.writeText(text).then(() => {
                showToast('📋 تم نسخ الدعوة للحافظة');
            }).catch(() => {
                showToast('❌ فشل النسخ');
            });
        }

        // ==================== Show Toast ====================
        function showToast(message) {
            const toast = document.getElementById('toast');
            toast.textContent = message;
            toast.classList.add('show');
            setTimeout(() => toast.classList.remove('show'), 2500);
        }

        // ==================== Countdown Timer ====================
        function updateCountdown() {
            const now = new Date();
            const diff = eventDate - now;
            
            if (diff <= 0) {
                document.getElementById('days').textContent = '00';
                document.getElementById('hours').textContent = '00';
                document.getElementById('minutes').textContent = '00';
                document.getElementById('seconds').textContent = '00';
                return;
            }
            
            const days = Math.floor(diff / (1000 * 60 * 60 * 24));
            const hours = Math.floor((diff % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
            const minutes = Math.floor((diff % (1000 * 60 * 60)) / (1000 * 60));
            const seconds = Math.floor((diff % (1000 * 60)) / 1000);
            
            document.getElementById('days').textContent = days.toString().padStart(2, '0');
            document.getElementById('hours').textContent = hours.toString().padStart(2, '0');
            document.getElementById('minutes').textContent = minutes.toString().padStart(2, '0');
            document.getElementById('seconds').textContent = seconds.toString().padStart(2, '0');
        }

        // ==================== Open Map ====================
        function openMap() {
            window.open(mapsLink, '_blank');
            setTimeout(() => showToast('🗺️ تم فتح خرائط جوجل'), 100);
        }

        // ==================== Initialize ====================
        document.addEventListener('DOMContentLoaded', () => {
            // Set the Gregorian and Hijri dates
            const gregorianDateStr = getGregorianDate(eventDate);
            const hijriDateStr = getHijriDate(eventDate);
            
            document.getElementById('gregorian-date').textContent = gregorianDateStr;
            document.getElementById('hijri-date').textContent = hijriDateStr + ' هـ';
            
            updateCountdown();
            setInterval(updateCountdown, 1000);
            
            document.getElementById('map-button').addEventListener('click', openMap);
            document.getElementById('share-button').addEventListener('click', shareInvitation);
            
            const buttons = document.querySelectorAll('.map-btn, .share-btn');
            buttons.forEach(btn => {
                btn.addEventListener('touchstart', function() { this.style.transform = 'scale(0.96)'; });
                btn.addEventListener('touchend', function() { this.style.transform = ''; });
                btn.addEventListener('touchcancel', function() { this.style.transform = ''; });
            });
        });
    </script>
</body>
</html>
